name: Publish VSCode Extension

on:
  push:
    tags:
      - "vscode-v*"

permissions:
  contents: write

jobs:
  # Path filters on `push.tags` are unreliable (tag-only pushes often skip them). Gate on the
  # tagged commit actually touching vscode-extension/ instead.
  extension-changed:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.check.outputs.changed }}
    steps:
      - uses: actions/checkout@v4

      - name: Check tagged commit touches vscode-extension/
        id: check
        shell: bash
        run: |
          set -euo pipefail
          if git show --pretty=format: --name-only --no-renames "${{ github.sha }}" |
            grep -qE '^vscode-extension/'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "Skipping publish: ${{ github.ref_name }} points at a commit with no changes under vscode-extension/." >> "$GITHUB_STEP_SUMMARY"
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

  publish:
    needs: extension-changed
    if: needs.extension-changed.outputs.changed == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: vscode-extension

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: vscode-extension/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Compile
        run: npm run compile

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Validate version matches tag
        shell: bash
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#vscode-v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "Error: tag version ($TAG_VERSION) does not match package.json version ($PKG_VERSION)"
            echo "Update package.json version to $TAG_VERSION before tagging."
            exit 1
          fi
          echo "PKG_VERSION=$PKG_VERSION" >> "$GITHUB_ENV"

      # Marketplace allows only major.minor.patch (no semver prerelease labels). Pre-releases use
      # `vsce --pre-release`; odd minor = pre-release per https://code.visualstudio.com/api/working-with-extensions/publishing-extension#prerelease-extensions
      - name: Package extension
        shell: bash
        run: |
          set -euo pipefail
          minor=$(node -p "parseInt(require('./package.json').version.split('.')[1] || '0', 10)")
          if [ $((minor % 2)) -eq 1 ]; then
            npx vsce package --pre-release
          else
            npx vsce package
          fi

      - name: Publish to VS Code Marketplace
        shell: bash
        env:
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
        run: |
          set -euo pipefail
          minor=$(node -p "parseInt(require('./package.json').version.split('.')[1] || '0', 10)")
          if [ $((minor % 2)) -eq 1 ]; then
            npx vsce publish --pre-release --pat "${VSCE_PAT}"
          else
            npx vsce publish --pat "${VSCE_PAT}"
          fi

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "VSCode Extension v${{ env.PKG_VERSION }}"
          files: vscode-extension/wisp-ai-*.vsix
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: false

      - name: Publish to Open VSX Registry
        continue-on-error: true
        env:
          OVSX_PAT: ${{ secrets.OVSX_PAT }}
        run: |
          set -euo pipefail
          if [ -z "${OVSX_PAT}" ]; then
            echo "Skipping Open VSX: OVSX_PAT secret is not set."
            exit 0
          fi
          npx ovsx publish wisp-ai-*.vsix --pat "${OVSX_PAT}"
