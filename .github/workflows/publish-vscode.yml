name: Publish VSCode Extension

on:
  push:
    tags:
      - "vscode-v*"

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: vscode-extension

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: vscode-extension/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Compile
        run: npm run compile

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Validate version matches tag
        shell: bash
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#vscode-v}"
          PKG_VERSION=$(node -p "require('./package.json').version")
          if [ "$TAG_VERSION" != "$PKG_VERSION" ]; then
            echo "Error: tag version ($TAG_VERSION) does not match package.json version ($PKG_VERSION)"
            echo "Update package.json version to $TAG_VERSION before tagging."
            exit 1
          fi
          echo "PKG_VERSION=$PKG_VERSION" >> "$GITHUB_ENV"

      - name: Package extension
        run: npx vsce package

      - name: Publish to VS Code Marketplace
        run: npx vsce publish --pat ${{ secrets.VSCE_PAT }}

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "VSCode Extension v${{ env.PKG_VERSION }}"
          files: vscode-extension/wisp-*.vsix
          prerelease: ${{ contains(github.ref_name, '-') }}
          generate_release_notes: false

      - name: Publish to Open VSX Registry
        if: secrets.OVSX_PAT != ''
        continue-on-error: true
        run: npx ovsx publish wisp-*.vsix --pat ${{ secrets.OVSX_PAT }}
